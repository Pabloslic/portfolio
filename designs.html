<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pablo's Portfolio | Graphic Design</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

<body>
  <header class="site-header">
    <nav class="navbar">
      <a class="brand" href="index.html">Pablo's Portfolio</a>
      <button class="menu-toggle" type="button" id="menuToggle" aria-expanded="false" aria-controls="siteMenu" aria-label="Open navigation menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="nav-links" id="siteMenu">
        <a href="index.html">Home</a>
        <a href="projects.html">Websites</a>
        <a class="active" href="designs.html">Graphic Design</a>
      </div>
    </nav>
  </header>

  <main class="section">
    <div class="section-heading">
      <p class="eyebrow">Presentation Gallery</p>
      <h1>Graphic Design</h1>
      <p>
        A portfolio wall of selected design pieces arranged in a cleaner editorial style.
        Click any image to view it larger.
      </p>
    </div>

    <section class="gallery-grid">
      <button class="gallery-card" type="button" data-full="images/img 1.png" data-alt="Mathia's Pride fashion flyer">
        <img src="images/img 1.png" alt="Graphic design image 1">
      </button>
      <button class="gallery-card" type="button" data-full="images/img 2.png" data-alt="Treasuregold attachment hub flyer">
        <img src="images/img 2.png" alt="Graphic design image 2">
      </button>
      <button class="gallery-card" type="button" data-full="images/img 3.png" data-alt="Native salad food poster">
        <img src="images/img 3.png" alt="Graphic design image 3">
      </button>
      <button class="gallery-card" type="button" data-full="images/img 4.png" data-alt="Treasure jewelry logo">
        <img src="images/img 4.png" alt="Graphic design image 4">
      </button>
      <button class="gallery-card" type="button" data-full="images/img 5.png" data-alt="Animal website phone mockup">
        <img src="images/img 5.png" alt="Graphic design image 5">
      </button>
      <button class="gallery-card" type="button" data-full="images/img 6.png" data-alt="Season discount mockup post">
        <img src="images/img 6.png" alt="Graphic design image 6">
      </button>
      <button class="gallery-card" type="button" data-full="images/img 7.png" data-alt="Animal UI UX banner">

        <img src="images/img 9.png" alt="Graphic design image 9">
      </button>
      <button class="gallery-card" type="button" data-full="images/img 10.png" data-alt="League standings graphic">
        <img src="images/img 10.png" alt="Graphic design image 10">
      </button>
      <button class="gallery-card" type="button" data-full="images/img 11.png" data-alt="Matchday fixtures flyer">
        <img src="images/img 11.png" alt="Graphic design image 11">
      </button>
      <button class="gallery-card" type="button" data-full="images/img 12.jpg" data-alt="Dropdown menu interface preview">
        <img src="images/img 12.jpg" alt="Graphic design image 12">
      </button>
    </section>
  </main>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox-close" id="lightboxClose" type="button" aria-label="Close image view">X</button>
    <img id="lightboxImage" src="" alt="">
  </div>

  <footer class="site-footer">
